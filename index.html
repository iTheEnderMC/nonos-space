<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carta Animada</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#ffd6e7,#ffffff);
  font-family:'Segoe UI',sans-serif;
  overflow:hidden;
}

/* ESCENA */
.escena{
  position:relative;
  width:280px;
  height:180px;
  cursor:pointer;
  transition:opacity 0.6s ease;
}

/* SOBRE BASE */
.sobre{
  position:absolute;
  width:100%;
  height:100%;
  background:#f8a5c2;
  border-radius:12px;
  box-shadow:0 15px 30px rgba(0,0,0,0.2);
  overflow:hidden;
}

/* TAPA */
.tapa{
  position:absolute;
  width:100%;
  height:100%;
  background:#ec407a;
  clip-path:polygon(0 0, 50% 65%, 100% 0);
  transform-origin:top;
  transition:transform 0.8s ease;
  z-index:3;
}

/* PAPEL */
.papel{
  position:absolute;
  width:90vw;
  max-width:420px;
  height:70vh;
  left:50%;
  top:50%;
  transform:translate(-50%,100%);
  padding:30px;
  box-sizing:border-box;
  border-radius:10px;
  font-size:16px;
  color:#444;
  background:
    repeating-linear-gradient(
      to bottom,
      #fffdf7,
      #fffdf7 28px,
      #f3e9dc 29px
    );
  box-shadow:0 20px 40px rgba(0,0,0,0.25);
  transition:transform 1s ease;
  z-index:2;
}

/* ABIERTO */
.abierto .tapa{
  transform:rotateX(180deg);
}

.abierto .papel{
  transform:translate(-50%,-50%);
}

/* INTERFAZ FINAL */
.interfaz{
  position:absolute;
  inset:0;
  background:#fff0f5;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  opacity:0;
  pointer-events:none;
  transition:opacity 0.8s ease;
}

.interfaz.activa{
  opacity:1;
  pointer-events:auto;
}

.boton{
  background:#ec407a;
  color:white;
  border:none;
  padding:15px 25px;
  border-radius:12px;
  margin-top:20px;
  font-size:16px;
}
</style>
</head>

<body>

<div class="escena" id="escena">
  <div class="sobre">
    <div class="tapa"></div>
  </div>

  <div class="papel">
    💌 Hola Ender,<br><br>
    Ahora la carta sale completamente
    desde el sobre y cubre gran parte
    de la pantalla.<br><br>
    Haz clic nuevamente para continuar...
  </div>
</div>

<div class="interfaz" id="interfaz">
  <h2 style="color:#d63384;">Bienvenido 🌸</h2>
  <button class="boton">Entrar</button>
</div>

<script>
let estado = 0;

document.body.addEventListener("click", function(){

  if(estado === 0){
    document.getElementById("escena").classList.add("abierto");
    estado = 1;
  } 
  else if(estado === 1){
    document.getElementById("escena").style.opacity="0";
    setTimeout(()=>{
      document.getElementById("interfaz").classList.add("activa");
    },600);
    estado = 2;
  }

});
</script>

</body>
</html>
