<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nono's Space</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#ffd6e7,#ffffff);
  font-family:'Segoe UI',sans-serif;
  overflow:hidden;
}

/* ===== ESCENA CARTA ===== */
.escena{
  position:relative;
  width:280px;
  height:180px;
  cursor:pointer;
  transition:opacity 0.6s ease;
}

.sobre{
  position:absolute;
  width:100%;
  height:100%;
  background:#f8a5c2;
  border-radius:12px;
  box-shadow:0 15px 30px rgba(0,0,0,0.2);
  overflow:hidden;
}

.tapa{
  position:absolute;
  width:100%;
  height:100%;
  background:#ec407a;
  clip-path:polygon(0 0, 50% 65%, 100% 0);
  transform-origin:top;
  transition:transform 0.8s ease;
  z-index:3;
}

.papel{
  position:absolute;
  width:90vw;
  max-width:420px;
  height:70vh;
  left:50%;
  top:50%;
  transform:translate(-50%,100%);
  padding:30px;
  box-sizing:border-box;
  border-radius:10px;
  font-size:16px;
  color:#444;
  background:
    repeating-linear-gradient(
      to bottom,
      #fffdf7,
      #fffdf7 28px,
      #f3e9dc 29px
    );
  box-shadow:0 20px 40px rgba(0,0,0,0.25);
  transition:transform 1s ease;
  z-index:2;
}

.abierto .tapa{
  transform:rotateX(180deg);
}

.abierto .papel{
  transform:translate(-50%,-50%);
}

/* ===== INTERFAZ ===== */
.interfaz{
  position:absolute;
  inset:0;
  background:linear-gradient(135deg,#ffd6e7,#ffffff);
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  align-items:center;
  opacity:0;
  pointer-events:none;
  transition:opacity 0.8s ease;
}

.interfaz.activa{
  opacity:1;
  pointer-events:auto;
}

.seccion{
  width:100%;
  display:none;
  opacity:0;
  transform:translateY(20px);
  transition:all 0.5s ease;
}

.seccion.activa{
  display:block;
  opacity:1;
  transform:translateY(0);
}

.contenido{
  text-align:center;
  margin-top:40px;
  padding:20px;
}

.encabezado-box{
  background:rgba(255,255,255,0.75);
  backdrop-filter:blur(8px);
  padding:25px;
  border-radius:25px;
  box-shadow:0 15px 35px rgba(0,0,0,0.15);
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:15px;
}

.titulo{
  color:#d63384;
  margin:0;
}

.descripcion{
  color:#555;
  margin:0;
}

.encabezado-box img{
  width:220px;
  border-radius:20px;
}

/* ===== GALERÍA ===== */
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  padding:20px;
}

.grid img{
  width:100%;
  aspect-ratio:1/1;
  object-fit:cover;
  border-radius:12px;
  cursor:pointer;
  transition:transform 0.3s ease;
}

.grid img:active{
  transform:scale(0.95);
}

/* VISOR */
.lightbox{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(8px);
  display:flex;
  justify-content:center;
  align-items:center;
  opacity:0;
  pointer-events:none;
  transition:opacity 0.4s ease;
}

.lightbox.activo{
  opacity:1;
  pointer-events:auto;
}

.lightbox img{
  max-width:90%;
  max-height:80%;
  border-radius:20px;
}

.flecha{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  font-size:40px;
  color:white;
  cursor:pointer;
  user-select:none;
  padding:20px;
}

.izq{ left:10px; }
.der{ right:10px; }

/* MENU */
.menu{
  width:90%;
  max-width:500px;
  margin-bottom:25px;
  background:rgba(255,255,255,0.6);
  backdrop-filter:blur(10px);
  border-radius:30px;
  display:flex;
  padding:8px;
  box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.item{
  flex:1;
  border:none;
  background:none;
  padding:12px;
  border-radius:25px;
  font-size:15px;
  cursor:pointer;
  color:#d63384;
  transition:all 0.3s ease;
}

.item.activo[data-seccion="cartas"]{ background:#ff8fab; color:white; }
.item.activo[data-seccion="galeria"]{ background:#f06292; color:white; }
.item.activo[data-seccion="extra"]{ background:#ec407a; color:white; }
</style>
</head>

<body>

<!-- CARTA -->
<div class="escena" id="escena">
  <div class="sobre"><div class="tapa"></div></div>
  <div class="papel">
    💌 Hola Ender...<br><br>
    Haz clic nuevamente para continuar...
  </div>
</div>

<!-- INTERFAZ -->
<div class="interfaz" id="interfaz">

  <!-- INICIO -->
  <div class="seccion activa" id="cartas">
    <div class="contenido">
      <div class="encabezado-box">
        <h1 class="titulo">Bienvenido 🌸</h1>
        <p class="descripcion">Explora cartas y recuerdos.</p>
        <img src="https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif">
      </div>
    </div>
  </div>

  <!-- GALERÍA -->
  <div class="seccion" id="galeria">
    <div class="grid" id="grid"></div>
  </div>

  <!-- CARTAS -->
  <div class="seccion" id="extra">
    <div class="contenido">
      <div class="encabezado-box">
        <h1 class="titulo">Cartas</h1>
        <p class="descripcion">Aquí puedes agregar tus cartas especiales.</p>
      </div>
    </div>
  </div>

  <div class="menu">
    <button class="item activo" data-seccion="cartas">Inicio</button>
    <button class="item" data-seccion="galeria">Galería</button>
    <button class="item" data-seccion="extra">Cartas</button>
  </div>

</div>

<!-- VISOR -->
<div class="lightbox" id="lightbox">
  <div class="flecha izq" id="prev">&#10094;</div>
  <img id="imagenActiva">
  <div class="flecha der" id="next">&#10095;</div>
</div>

<script>
let estado = 0;

document.body.addEventListener("click", function(){
  if(estado === 0){
    escena.classList.add("abierto");
    estado = 1;
  } 
  else if(estado === 1){
    escena.style.opacity="0";
    setTimeout(()=>interfaz.classList.add("activa"),600);
    estado = 2;
  }
});

const secciones = document.querySelectorAll(".seccion");
document.querySelectorAll(".item").forEach(boton=>{
  boton.addEventListener("click", function(e){
    e.stopPropagation();
    document.querySelectorAll(".item").forEach(b=>b.classList.remove("activo"));
    this.classList.add("activo");
    secciones.forEach(sec=>sec.classList.remove("activa"));
    document.getElementById(this.dataset.seccion).classList.add("activa");
  });
});

/* ===== GALERÍA ===== */
const imagenes = [
  "img/foto1.png",
  "img/foto2.png",
  "img/foto3.jpg"
];

const grid = document.getElementById("grid");
let indiceActual = 0;

imagenes.forEach((src,i)=>{
  const img = document.createElement("img");
  img.src = src;
  img.onclick = ()=>abrir(i);
  grid.appendChild(img);
});

function abrir(i){
  indiceActual = i;
  imagenActiva.src = imagenes[i];
  lightbox.classList.add("activo");
}

function cerrar(){
  lightbox.classList.remove("activo");
}

function mostrar(dir){
  let nuevo = indiceActual + dir;
  if(nuevo >=0 && nuevo < imagenes.length){
    abrir(nuevo);
  }
}

prev.onclick = (e)=>{
  e.stopPropagation();
  mostrar(-1);
};

next.onclick = (e)=>{
  e.stopPropagation();
  mostrar(1);
};

lightbox.onclick = cerrar;
imagenActiva.onclick = e=>e.stopPropagation();
</script>

</body>
</html>
